apiVersion: v1
kind: Pod
metadata:
  name: webapp-with-sidecar
spec:
  containers:
    - name: webapp
      image: nginx:latest
      volumeMounts:
        - name: logs
          mountPath: /app/logs

    - name: log-shipper
      image: fluent/fluent-bit:latest
      volumeMounts:
        - name: logs
          mountPath: /app/logs
          readOnly: true

  volumes:
    - name: logs
      emptyDir: {}
