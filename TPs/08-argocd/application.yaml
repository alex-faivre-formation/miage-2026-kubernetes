apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresdb
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/alex-faivre-formation/miage-2026-kubernetes.git
    targetRevision: main
    path: TPs/02-postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
